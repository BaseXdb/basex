name: Docker Image

# Builds release containers from the official zips on files.basex.org.
#
# Triggers:
# - schedule: weekly rebuild of the newest release per supported major line,
#   picking up new BaseX releases and security updates of the base image.
# - push tag / workflow_dispatch: build one specific version.
on:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: 'BaseX release version (e.g. 12.4)'
        required: true
      publish:
        description: 'Push the image to the registry'
        type: boolean
        default: true
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  # major lines that receive weekly rebuilds
  SUPPORTED_MAJORS: '12'

jobs:
  versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.list.outputs.versions }}
      newest: ${{ steps.list.outputs.newest }}
    steps:
      - name: Determine versions to build
        id: list
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSIONS='["${{ github.event.inputs.version }}"]'
          elif [ "${{ github.event_name }}" = "push" ]; then
            VERSIONS='["${{ github.ref_name }}"]'
          else
            # newest release per supported major line, from the release index
            ALL=$(curl -fs https://files.basex.org/releases/ \
              | grep -oE 'href="[0-9]+\.[0-9]+(\.[0-9]+)?/"' \
              | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -uV)
            VERSIONS=$(for MAJOR in $SUPPORTED_MAJORS; do
              echo "$ALL" | grep "^$MAJOR\." | tail -1
            done | jq -Rnc '[inputs]')
          fi
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "newest=$(echo "$VERSIONS" | jq -r 'sort_by(split(".") | map(tonumber)) | last')" >> "$GITHUB_OUTPUT"

  docker:
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.versions.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive tags
        id: tags
        run: |
          # in a fork, images go to the fork owner's namespace (ghcr requires lowercase)
          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER,,}/basex"
          VERSION="${{ matrix.version }}"
          TAGS="$IMAGE:$VERSION,$IMAGE:${VERSION%%.*}"
          if [ "$VERSION" = "${{ needs.versions.outputs.newest }}" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: docker
          build-args: BASEX_VERSION=${{ matrix.version }}
          pull: true
          load: true
          tags: basex:smoke

      - name: Smoke test (HTTP server, DBA, admin password)
        run: |
          docker run -d --name smoke -p 8080:8080 -e BASEX_ADMIN_PASSWORD=smoke-test basex:smoke
          timeout 90 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" smoke)" = "healthy" ]; do sleep 2; done'
          curl -fs http://localhost:8080/ > /dev/null
          curl -fsL http://localhost:8080/dba > /dev/null
          curl -fs -u admin:smoke-test http://localhost:8080/rest > /dev/null
          docker rm -f smoke

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # For Docker Hub, add a second docker/login-action with
      # DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets and extra tags below.

      - name: Build and push multi-arch image
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: docker
          build-args: BASEX_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.tags.outputs.tags }}
